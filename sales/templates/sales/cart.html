{% extends "sales/base.html" %}

{% block content %}
<h2>Your Cart</h2>

{% if cart %}
<table>
<tr>
<th>Product</th><th>Price</th><th>Quantity</th><th>Total</th></tr>
{% for id, item in cart.items %}
<tr>
<td>{{ item.name }}</td>
<td>{{ item.price }}</td>
<td>{{ item.qty }}</td>
<td>{{ item.total }}</td>
</tr>
{% endfor %}
</table>

<h3>Total: ${{ total }}</h3>
<a href="{% url 'checkout' %}"><button>Checkout</button></a>
{% else %}
<p>Your cart is empty.</p>
{% endif %}

{% endblock %}
