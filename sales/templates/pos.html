<!DOCTYPE html>
<html>
<head>
    <title>Supermarket POS</title>
</head>
<body>

<h1>Supermarket POS</h1>

<h2>Make Sale</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Checkout</button>
</form>

<h2>Recent Sales</h2>

<table border="1">
<tr>
    <th>Product</th>
    <th>Quantity</th>
    <th>Total Price</th>
    <th>Date</th>
</tr>

{% for sale in sales %}
<tr>
    <td>{{ sale.product }}</td>
    <td>{{ sale.quantity_sold }}</td>
    <td>{{ sale.total_price }}</td>
    <td>{{ sale.sold_at }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
